name: cd 
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: build notely
        run: ./scripts/buildprod.sh

      - name: auth to cloud 
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      
      - name: Set up Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: notely-497715

      - name: build docker
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-497715/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-497715/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-497715 --max-instances=4
