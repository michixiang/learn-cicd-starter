name: cd 
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: build notely
        run: ./scripts/buildprod.sh
      
      - name: Set up Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: auth to cloud 
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    docker:
      - name: build docker
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-497715/notely-ar-repo/notely:latest .
